<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パフェカーリング">
<meta name="theme-color" content="#ff7ac6">
<title>フルーツパフェ カーリング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100vh; height: 100dvh;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    background: linear-gradient(135deg, #ff9ec7, #ffd36e, #7ee8fa, #c79bff);
    background-size: 400% 400%;
    animation: bgshift 14s ease infinite;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; overscroll-behavior: none;
  }
  @keyframes bgshift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  #app {
    width: 100%; max-width: 440px; height: 100%; max-height: 920px;
    display: flex; flex-direction: column; gap: 8px;
    padding: max(8px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
             max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
  }
  header { text-align: center; position: relative; }
  header h1 {
    font-size: 21px; font-weight: 800; letter-spacing: .3px;
    background: linear-gradient(90deg, #ff3d7f, #ff8a00, #ffd000, #1ec8b0, #7b5cff, #ff3d7f);
    background-size: 300% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: hue 6s linear infinite;
    text-shadow: 0 1px 0 rgba(255,255,255,.4);
    filter: drop-shadow(0 2px 1px rgba(255,255,255,.6));
  }
  @keyframes hue { to { background-position: 300% center; } }
  header p { font-size: 11px; color: #b81d6f; margin-top: 2px; font-weight: 600; }
  #muteBtn {
    position: absolute; right: 2px; top: 2px;
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.8); font-size: 18px; cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,.15); line-height: 1;
  }
  #muteBtn:active { transform: scale(.92); }

  .hud {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,.78); border-radius: 16px; padding: 8px 14px;
    box-shadow: 0 4px 14px rgba(186,29,111,.18);
  }
  .hud .label { font-size: 11px; color: #d81b8c; font-weight: 800; }
  .hud .score { font-size: 28px; font-weight: 900; color: #c2185b; line-height: 1;
    transition: transform .12s; transform-origin: left center; }
  .hud .score.pop { transform: scale(1.35); }
  .hud .best { font-size: 12px; color: #f9568a; font-weight: 700; }
  .next { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .next .nextEmoji { font-size: 32px; line-height: 1; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  .stage-wrap {
    position: relative; flex: 1;
    border-radius: 20px; overflow: hidden;
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.55), 0 10px 28px rgba(123,92,255,.25);
    background:
      radial-gradient(circle at 50% 14%, rgba(255,255,255,.55), rgba(255,255,255,0) 26%),
      linear-gradient(180deg, #b388ff 0%, #8ec5ff 40%, #b9f6ca 72%, #fff59d 100%);
  }
  .stage-wrap::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.9) 2px, transparent 3px),
      radial-gradient(circle, rgba(255,255,255,.7) 2px, transparent 3px);
    background-size: 70px 70px, 110px 110px;
    background-position: 0 0, 35px 55px;
    animation: drift 7s linear infinite; opacity: .5;
  }
  @keyframes drift { to { background-position: 0 70px, 35px 165px; } }
  canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 1; }

  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 14px; color: #fff; text-align: center; z-index: 5; padding: 20px;
    background: linear-gradient(160deg, rgba(255,61,127,.9), rgba(123,92,255,.9));
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; animation: fadein .3s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .overlay h2 { font-size: 32px; font-weight: 900; text-shadow: 0 3px 0 rgba(0,0,0,.15); }
  .overlay p { font-size: 16px; opacity: .95; font-weight: 600; }
  .btn {
    margin-top: 6px; border: none; cursor: pointer;
    background: linear-gradient(180deg, #ffe66d, #ffb627); color: #b8005d; font-weight: 900;
    font-size: 19px; padding: 13px 30px; border-radius: 999px;
    box-shadow: 0 6px 0 #e8890b; transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e8890b; }

  .chain {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 3px;
    background: rgba(255,255,255,.7); border-radius: 14px; padding: 6px;
    font-size: 17px; box-shadow: 0 3px 10px rgba(186,29,111,.12);
  }
  .chain .arrow { font-size: 10px; color: #ff7ac6; align-self: center; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🍨 フルーツパフェ カーリング 🍓</h1>
    <p>手前から奥へスライド！ 同じフルーツがぶつかると合体してパフェに近づく</p>
    <button id="muteBtn" aria-label="音のオンオフ">🔊</button>
  </header>

  <div class="hud">
    <div>
      <div class="label">スコア</div>
      <div class="score" id="score">0</div>
      <div class="best">ベスト <span id="best">0</span></div>
    </div>
    <div class="next">
      <div class="label">つぎ</div>
      <div class="nextEmoji" id="nextEmoji">🫐</div>
    </div>
  </div>

  <div class="stage-wrap" id="stageWrap">
    <canvas id="stage"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">ゲームオーバー</h2>
      <p id="ovText">手前に溜まりすぎ！</p>
      <button class="btn" id="restart">もう一度あそぶ</button>
    </div>
  </div>

  <div class="chain" id="chain"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Render, Runner, World, Bodies, Body, Events, Composite } = Matter;

// 進化チェーン：フルーツ → パフェ（小さい順）
const ITEMS = [
  { emoji: "🫐", r: 15, name: "ブルーベリー" },
  { emoji: "🍓", r: 19, name: "いちご" },
  { emoji: "🍒", r: 24, name: "さくらんぼ" },
  { emoji: "🥝", r: 30, name: "キウイ" },
  { emoji: "🍑", r: 37, name: "もも" },
  { emoji: "🍊", r: 45, name: "みかん" },
  { emoji: "🍍", r: 54, name: "パイナップル" },
  { emoji: "🍈", r: 63, name: "メロン" },
  { emoji: "🍉", r: 73, name: "スイカ" },
  { emoji: "🍦", r: 83, name: "ソフトクリーム" },
  { emoji: "🍨", r: 94, name: "パフェ完成！" },
];
const SPAWNABLE = 4;

let W = 420, H = 620;
const WALL = 16;

const stageWrap = document.getElementById("stageWrap");
const canvas = document.getElementById("stage");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const nextEmojiEl = document.getElementById("nextEmoji");
const overlay = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const muteBtn = document.getElementById("muteBtn");

let engine, runner, render;
let score = 0;
let best = +(localStorage.getItem("ftp_best") || 0);
let nextLevel = 0;
let activeBody = null;
let phase = "aim";
let gameOver = false;
let overflowTimer = 0;

function anchorPos() { return { x: W / 2, y: H - 56 }; }
function foulY() { return H - 96; }

let aiming = false;
let aimVec = { x: 0, y: 0 };
const MAX_PULL = 200;
const POWER = 0.12;
const MIN_POWER_DIST = 14;

bestEl.textContent = best;

/* ===================== オーディオ（Web Audio合成） ===================== */
let AC = null, master, musicGain, sfxGain;
let audioOn = true, musicStarted = false;
let nextStepTime = 0, musicStep = 0, musicTimer = null;
const BPM = 128, STEP_DUR = 60 / BPM / 2; // 8分音符
const N = (f) => f;
// 明るいCメジャー系メロディ（16ステップ／0は休符）
const LEAD = [659, 0, 784, 880, 784, 659, 587, 0, 523, 0, 659, 784, 880, 0, 784, 587];
const BASS = [131, 0,0,0, 175, 0,0,0, 110, 0,0,0, 98, 0,0,0]; // C F A G
function initAudio() {
  if (AC) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  AC = new Ctx();
  master = AC.createGain(); master.gain.value = 0.9; master.connect(AC.destination);
  musicGain = AC.createGain(); musicGain.gain.value = 0.0; musicGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(master);
}
function unlockAudio() {
  initAudio();
  if (AC.state === "suspended") AC.resume();
  if (!musicStarted) { musicStarted = true; nextStepTime = AC.currentTime + 0.1;
    musicTimer = setInterval(scheduler, 25); }
  applyAudioState();
}
function applyAudioState() {
  if (!AC) return;
  const t = AC.currentTime;
  musicGain.gain.cancelScheduledValues(t);
  musicGain.gain.linearRampToValueAtTime(audioOn ? 0.16 : 0.0, t + 0.2);
  sfxGain.gain.setValueAtTime(audioOn ? 0.9 : 0.0, t);
}
function scheduler() {
  if (!AC) return;
  while (nextStepTime < AC.currentTime + 0.12) {
    const s = musicStep % 16;
    if (LEAD[s]) blip(LEAD[s], nextStepTime, 0.16, "triangle", 0.5, musicGain);
    if (BASS[s]) blip(BASS[s], nextStepTime, 0.22, "sine", 0.7, musicGain);
    if (s % 2 === 1) hat(nextStepTime, musicGain, 0.12); // 裏拍のハイハット
    nextStepTime += STEP_DUR;
    musicStep++;
  }
}
function blip(freq, t, dur, type, gain, dest) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(dest);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
function hat(t, dest, gain) {
  const buf = AC.createBuffer(1, 256, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
  const g = AC.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  src.connect(hp); hp.connect(g); g.connect(dest); src.start(t); src.stop(t + 0.06);
}
function sfxMerge(level) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const base = 420 * Math.pow(1.07, level * 2);
  blip(base, t, 0.18, "triangle", 0.5, sfxGain);
  blip(base * 1.5, t + 0.05, 0.16, "sine", 0.35, sfxGain);
  blip(base * 2, t + 0.1, 0.12, "sine", 0.22, sfxGain);
}
function sfxLaunch(power) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(260 + power * 320, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.26);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.22, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.3);
}
function sfxEnd(winFlag) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const seq = winFlag ? [523, 659, 784, 1046, 1318] : [523, 440, 349, 262];
  seq.forEach((f, i) => blip(f, t + i * 0.13, 0.3, winFlag ? "triangle" : "sawtooth", 0.5, sfxGain));
}
muteBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  audioOn = !audioOn;
  muteBtn.textContent = audioOn ? "🔊" : "🔇";
  if (!AC) unlockAudio(); else applyAudioState();
});

/* ===================== 絵文字テクスチャ ===================== */
const texCache = {};
function emojiTexture(emoji, r) {
  const key = emoji + "_" + r;
  if (texCache[key]) return texCache[key];
  const size = Math.ceil(r * 2);
  const c = document.createElement("canvas");
  c.width = c.height = size * 2;
  const ctx = c.getContext("2d");
  ctx.font = (size * 1.5) + "px serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(emoji, size, size * 1.05);
  texCache[key] = { url: c.toDataURL(), scale: (r * 2) / (size * 2) };
  return texCache[key];
}

function makeItem(level, x, y, opts = {}) {
  const it = ITEMS[level];
  const tex = emojiTexture(it.emoji, it.r);
  const body = Bodies.circle(x, y, it.r, {
    restitution: 0.08, friction: 0.05, frictionAir: 0.03, density: 0.0014,
    label: "item",
    render: { sprite: { texture: tex.url, xScale: tex.scale, yScale: tex.scale } },
    ...opts,
  });
  body.level = level; body.merging = false;
  return body;
}

function setupWorld() {
  engine = Engine.create();
  engine.gravity.y = 0; engine.gravity.x = 0;
  render = Render.create({
    canvas, engine,
    options: { width: W, height: H, wireframes: false, background: "transparent",
      pixelRatio: window.devicePixelRatio || 1 },
  });
  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  const wallOpts = { isStatic: true, restitution: 0, friction: 0.1, render: { fillStyle: "rgba(255,255,255,0.32)" } };
  World.add(engine.world, [
    Bodies.rectangle(W / 2, -WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(W / 2, H + WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(-WALL / 2, H / 2, WALL, H * 2, wallOpts),
    Bodies.rectangle(W + WALL / 2, H / 2, WALL, H * 2, wallOpts),
  ]);
  Events.on(engine, "collisionStart", handleCollision);
  Events.on(engine, "afterUpdate", afterUpdate);
}

function handleCollision(ev) {
  for (const pair of ev.pairs) {
    const a = pair.bodyA, b = pair.bodyB;
    if (a.label !== "item" || b.label !== "item") continue;
    if (a.merging || b.merging) continue;
    if (a.level !== b.level) continue;
    if (a.level >= ITEMS.length - 1) continue;

    a.merging = b.merging = true;
    const nx = (a.position.x + b.position.x) / 2;
    const ny = (a.position.y + b.position.y) / 2;
    const vx = (a.velocity.x + b.velocity.x) / 2;
    const vy = (a.velocity.y + b.velocity.y) / 2;
    const newLevel = a.level + 1;

    World.remove(engine.world, a);
    World.remove(engine.world, b);
    const merged = makeItem(newLevel, nx, ny);
    Body.setVelocity(merged, { x: vx, y: vy });
    World.add(engine.world, merged);

    popEffect(nx, ny, ITEMS[newLevel]);
    burst(nx, ny, newLevel);
    sfxMerge(newLevel);
    addScore((newLevel + 1) * 10);
    if (newLevel === ITEMS.length - 1) win();
  }
}

/* ===================== エフェクト（リング＋コンフェッティ） ===================== */
const effects = [];
function popEffect(x, y, item) { effects.push({ x, y, r: item.r, life: 1 }); }
const confetti = [];
const CONF_COLORS = ["#ff5d8f", "#ff8a5b", "#ffd23f", "#5fd068", "#4dabf7", "#9775fa", "#ff85c0"];
function burst(x, y, level) {
  const n = 10 + level * 2;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    confetti.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, size: 3 + Math.random() * 5, rot: Math.random() * 6.28,
      vr: (Math.random() - 0.5) * 0.4, color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0] });
  }
}

let settleFrames = 0;
function afterUpdate() {
  if (gameOver) return;
  let maxSpeed = 0, overflow = false;
  for (const body of Composite.allBodies(engine.world)) {
    if (body.label !== "item") continue;
    if (body === activeBody && body.isStatic) continue;
    const sp = Math.hypot(body.velocity.x, body.velocity.y);
    if (sp > maxSpeed) maxSpeed = sp;
    if (sp < 0.5 && body.position.y - ITEMS[body.level].r > foulY()) overflow = true;
  }
  if (phase === "moving") {
    if (maxSpeed < 0.4) { settleFrames++; if (settleFrames > 18) { settleFrames = 0; spawnNext(); } }
    else settleFrames = 0;
  }
  if (overflow) { overflowTimer += 16; if (overflowTimer > 1400) endGame(); }
  else overflowTimer = 0;
}

function drawOverlayGfx() {
  const ctx = render.context;
  ctx.save();
  // パース線（奥行き感）
  ctx.strokeStyle = "rgba(255,255,255,0.28)"; ctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++) { const y = (H * 0.12) * i; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // ファウルライン
  ctx.strokeStyle = "rgba(255,49,118,0.7)"; ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
  ctx.beginPath(); ctx.moveTo(0, foulY()); ctx.lineTo(W, foulY()); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // リング
  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i]; e.life -= 0.05;
    if (e.life <= 0) { effects.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 + (1 - e.life) * 0.7), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${e.life})`; ctx.lineWidth = 3; ctx.stroke();
  }
  // コンフェッティ
  for (let i = confetti.length - 1; i >= 0; i--) {
    const p = confetti[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.rot += p.vr; p.life -= 0.022;
    if (p.life <= 0) { confetti.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6); ctx.restore();
  }

  // エイミングガイド
  if (aiming && activeBody && phase === "aim") {
    const a = anchorPos();
    const dist = Math.hypot(aimVec.x, aimVec.y);
    const power = Math.min(dist, MAX_PULL) / MAX_PULL;
    const dir = dist > 0 ? { x: aimVec.x / dist, y: aimVec.y / dist } : { x: 0, y: -1 };
    const len = 60 + power * 300;
    ctx.strokeStyle = "rgba(255,255,255,0.95)"; ctx.lineWidth = 4; ctx.setLineDash([10, 9]);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x + dir.x * len, a.y + dir.y * len); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(a.x, a.y, ITEMS[activeBody.level].r + 8, -Math.PI / 2, -Math.PI / 2 + power * Math.PI * 2);
    ctx.strokeStyle = power > 0.85 ? "#ff5d8f" : "#ffd23f"; ctx.lineWidth = 5; ctx.stroke();
  }
}

function spawnNext() {
  if (gameOver) return;
  phase = "aim";
  const level = nextLevel;
  nextLevel = Math.floor(Math.random() * SPAWNABLE);
  nextEmojiEl.textContent = ITEMS[nextLevel].emoji;
  const a = anchorPos();
  activeBody = makeItem(level, a.x, a.y, { isStatic: true });
  World.add(engine.world, activeBody);
}

function launch() {
  if (!activeBody || phase !== "aim") return;
  const dist = Math.hypot(aimVec.x, aimVec.y);
  if (dist < MIN_POWER_DIST) return;
  const power = Math.min(dist, MAX_PULL);
  const dirx = aimVec.x / dist, diry = aimVec.y / dist;
  const speed = power * POWER;
  const body = activeBody;
  Body.setStatic(body, false);
  Body.setVelocity(body, { x: dirx * speed, y: diry * speed });
  sfxLaunch(power / MAX_PULL);
  activeBody = null; phase = "moving"; settleFrames = 0;
}

function toCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
}

function onDown(clientX, clientY) {
  unlockAudio();
  if (gameOver || phase !== "aim" || !activeBody) return;
  aiming = true; updateAim(clientX, clientY);
}
function onMove(clientX, clientY) { if (aiming) updateAim(clientX, clientY); }
function onUp() { if (!aiming) return; aiming = false; launch(); aimVec = { x: 0, y: 0 }; }
function updateAim(clientX, clientY) {
  const p = toCanvas(clientX, clientY);
  const a = anchorPos();
  let vx = a.x - p.x;
  let vy = a.y - p.y;
  vy = -Math.abs(vy);
  if (vy > -10) vy = -10;
  aimVec = { x: vx, y: vy };
}

function addScore(n) {
  score += n; scoreEl.textContent = score;
  scoreEl.classList.add("pop"); setTimeout(() => scoreEl.classList.remove("pop"), 130);
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem("ftp_best", best); }
}

function endGame() {
  if (gameOver) return;
  gameOver = true;
  ovTitle.textContent = "ゲームオーバー";
  ovText.textContent = `手前に溜まりすぎ！ スコア ${score}`;
  overlay.classList.add("show"); sfxEnd(false);
}
function win() {
  if (gameOver) return;
  gameOver = true;
  ovTitle.textContent = "🍨 パフェ完成！";
  ovText.textContent = `おみごと！ スコア ${score}`;
  overlay.classList.add("show"); sfxEnd(true);
}

function resetGame() {
  if (engine) { Render.stop(render); Runner.stop(runner); World.clear(engine.world); Engine.clear(engine); }
  effects.length = 0; confetti.length = 0;
  score = 0; scoreEl.textContent = 0;
  gameOver = false; phase = "aim"; activeBody = null;
  aiming = false; aimVec = { x: 0, y: 0 };
  overflowTimer = 0; settleFrames = 0;
  nextLevel = Math.floor(Math.random() * SPAWNABLE);
  overlay.classList.remove("show");
  setupWorld();
  Events.on(render, "afterRender", drawOverlayGfx);
  spawnNext();
}

function measure() { const rect = stageWrap.getBoundingClientRect(); W = Math.round(rect.width); H = Math.round(rect.height); }

canvas.addEventListener("mousedown", (e) => onDown(e.clientX, e.clientY));
canvas.addEventListener("mousemove", (e) => onMove(e.clientX, e.clientY));
window.addEventListener("mouseup", onUp);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); const t = e.touches[0]; onDown(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); onUp(); }, { passive: false });

document.getElementById("restart").addEventListener("click", (e) => { unlockAudio(); resetGame(); });

(function buildChain() {
  const el = document.getElementById("chain");
  ITEMS.forEach((it, i) => {
    const s = document.createElement("span"); s.textContent = it.emoji; s.title = it.name; el.appendChild(s);
    if (i < ITEMS.length - 1) { const a = document.createElement("span"); a.className = "arrow"; a.textContent = "▶"; el.appendChild(a); }
  });
})();

window.addEventListener("resize", measure);
window.addEventListener("load", () => { measure(); resetGame(); });
</script>
</body>
</html>
