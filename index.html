<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パフェカーリング">
<meta name="theme-color" content="#7ec8f0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>フルーツパフェ カーリング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100vh; height: 100dvh;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; overscroll-behavior: none;
    /* ビーチ：空 → 海 → 砂浜 */
    background: linear-gradient(180deg,
      #79c6ef 0%, #a9def9 26%, #6fc6ec 31%,
      #2f9fd6 35%, #1f7fb8 44%, #7fcbe8 47.5%,
      #f4dda6 51%, #eccf8f 100%);
  }

  #app {
    width: 100%; max-width: 460px; height: 100%; max-height: 940px;
    display: flex; flex-direction: column;
    padding: max(4px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right))
             max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
    position: relative;
  }

  /* 藁屋根＋電飾 */
  .roof {
    height: 26px; border-radius: 0 0 10px 10px; position: relative; z-index: 3;
    background: repeating-linear-gradient(96deg, #a8722a 0 5px, #c79140 5px 10px, #946627 10px 15px);
    box-shadow: 0 3px 6px rgba(0,0,0,.25);
  }
  .lights {
    display: flex; justify-content: space-around; align-items: flex-start;
    margin-top: -2px; padding: 0 14px; position: relative; z-index: 3;
    border-top: 2px solid rgba(60,40,15,.35);
  }
  .lights b {
    display: block; width: 11px; height: 11px; border-radius: 50%;
    margin-top: 3px;
  }
  .lights b:nth-child(odd)  { background: #ffe066; box-shadow: 0 0 8px 2px #ffe066aa; }
  .lights b:nth-child(even) { background: #ff9f43; box-shadow: 0 0 8px 2px #ff9f43aa; margin-top: 9px; }

  /* 上部HUD */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 8px; z-index: 2; }
  .next-badge { display: flex; flex-direction: column; align-items: center; gap: 1px; width: 64px; }
  .next-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #fffaf0, #ffe7b8);
    border: 3px solid #ffd166; box-shadow: 0 3px 8px rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden;
  }
  .next-circle img { width: 84%; height: 84%; object-fit: contain; }
  .next-badge span { font-size: 12px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.35); }
  .score-pill {
    background: linear-gradient(180deg, #fff3d6, #ffe3a8);
    border: 3px solid #e9b85c; border-radius: 16px;
    padding: 4px 22px; font-size: 26px; font-weight: 900; color: #8a5a1c;
    box-shadow: 0 3px 8px rgba(0,0,0,.2); line-height: 1.1; text-align: center;
    transition: transform .12s;
  }
  .score-pill.pop { transform: scale(1.18); }
  .score-pill small { display:block; font-size: 10px; color:#b07d35; font-weight:800; letter-spacing:.5px; }
  #muteBtn {
    width: 50px; height: 50px; border-radius: 14px; border: 3px solid #e9b85c;
    background: radial-gradient(circle at 50% 35%, #ffe9a8, #ffcf5e);
    font-size: 22px; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,.25); line-height: 1;
  }
  #muteBtn:active { transform: scale(.92); }

  /* 木のテーブル（プレイ面） */
  .stage-wrap {
    position: relative; flex: 1; margin: 2px 2px 8px; z-index: 1;
    border-radius: 16px 16px 22px 22px; overflow: hidden;
    box-shadow: inset 0 0 0 6px #9c6429, inset 0 0 0 9px #7c4d1d, 0 10px 22px rgba(60,35,10,.35);
    background:
      linear-gradient(180deg, rgba(50,28,8,.30) 0%, rgba(50,28,8,0) 20%),
      repeating-linear-gradient(90deg, rgba(86,52,20,0) 0 56px, rgba(86,52,20,.30) 56px 59px),
      repeating-linear-gradient(90deg, rgba(255,225,180,0) 0 56px, rgba(255,225,180,.10) 59px 62px),
      linear-gradient(180deg, #c5854a 0%, #d6965a 55%, #e0a566 100%);
  }
  .bolts {
    position: absolute; left: 0; right: 0; bottom: 26%; height: 7px; opacity: .45; pointer-events: none;
    background-image: radial-gradient(circle, #5a3812 2px, transparent 3px);
    background-size: 60px 7px; background-position: 12px 0;
  }
  canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 1; }

  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 14px; color: #fff; text-align: center; z-index: 5; padding: 20px;
    background: linear-gradient(160deg, rgba(31,127,184,.92), rgba(20,90,140,.92));
    backdrop-filter: blur(3px);
  }
  .overlay.show { display: flex; animation: fadein .3s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .overlay h2 { font-size: 32px; font-weight: 900; text-shadow: 0 3px 0 rgba(0,0,0,.18); }
  .overlay p { font-size: 16px; opacity: .95; font-weight: 600; }
  .btn {
    margin-top: 6px; border: none; cursor: pointer;
    background: linear-gradient(180deg, #ffe66d, #ffb627); color: #8a4d05; font-weight: 900;
    font-size: 19px; padding: 13px 30px; border-radius: 999px;
    box-shadow: 0 6px 0 #d98a0b; transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d98a0b; }

  /* 進化バー（青い帯＋矢印） */
  .evo-wrap { position: relative; z-index: 2; padding: 0 2px; }
  .evo-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 2px; padding: 7px 26px 7px 12px;
    background: linear-gradient(180deg, #4cc6f2 0%, #1ba3da 100%);
    border: 3px solid #fff; border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,.25);
  }
  .evo-bar::after {
    content: ""; position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    border-top: 16px solid transparent; border-bottom: 16px solid transparent;
    border-left: 20px solid #1ba3da; filter: drop-shadow(2px 0 0 #fff);
  }
  .evo-bar .item { line-height: 0; transition: filter .2s, opacity .2s; }
  .evo-bar .item img { width: 23px; height: 23px; object-fit: contain; display: block; }
  .evo-bar .item.locked { filter: brightness(0) saturate(0); opacity: .4; }

  /* 全画面オーバーレイ（タイトル／ランキング） */
  .screen {
    position: absolute; inset: 0; z-index: 30; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 24px; text-align: center;
    background: linear-gradient(170deg, rgba(126,200,240,.96), rgba(255,160,200,.96));
  }
  .screen.show { display: flex; animation: fadein .3s ease; }
  .screen .titleArt { width: 120px; height: 120px; filter: drop-shadow(0 6px 10px rgba(0,0,0,.2)); animation: bob 2s ease-in-out infinite; }
  .screen h1.big {
    font-size: 30px; font-weight: 900; line-height: 1.25;
    background: linear-gradient(90deg, #ff3d7f, #ff8a00, #ffd000, #1ec8b0, #7b5cff, #ff3d7f);
    background-size: 300% auto; -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent; animation: hue 6s linear infinite;
  }
  .screen .sub { font-size: 13px; color: #6a2348; font-weight: 700; max-width: 280px; }
  .screen .bestline { font-size: 15px; color: #fff; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
  .bigbtn {
    border: none; cursor: pointer; min-width: 200px;
    background: linear-gradient(180deg, #ffe66d, #ffb627); color: #8a4d05; font-weight: 900;
    font-size: 20px; padding: 14px 30px; border-radius: 999px;
    box-shadow: 0 6px 0 #d98a0b; transition: transform .08s, box-shadow .08s;
  }
  .bigbtn.alt { background: linear-gradient(180deg, #9ad7ff, #4cb3f0); color: #0a4a73; box-shadow: 0 6px 0 #1d7fc0; font-size: 16px; min-width: 160px; padding: 11px 24px; }
  .bigbtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d98a0b; }
  .bigbtn.alt:active { box-shadow: 0 2px 0 #1d7fc0; }

  /* ランキング表 */
  .ranklist { list-style: none; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
  .ranklist li {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.85); border-radius: 12px; padding: 8px 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .ranklist .rk { font-size: 17px; font-weight: 900; color: #c2185b; width: 34px; text-align: center; }
  .ranklist .nm { flex: 1; text-align: left; font-weight: 700; color: #5a3a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ranklist .sc { font-weight: 900; color: #8a5a1c; }
  .ranklist li.me { background: #fff3c4; outline: 2px solid #ffcf5e; }
  .ranklist .empty { justify-content: center; color: #7a5a3a; font-weight: 700; }

  /* ゲームオーバーの登録欄 */
  .reg { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .reg input {
    width: 150px; font-size: 16px; padding: 9px 12px; border-radius: 12px;
    border: 2px solid #fff; background: rgba(255,255,255,.95); color: #5a3a1a; font-weight: 700; text-align: center;
  }
  .reg button {
    border: none; cursor: pointer; background: linear-gradient(180deg,#ffe66d,#ffb627);
    color: #8a4d05; font-weight: 900; font-size: 15px; padding: 9px 16px; border-radius: 12px; box-shadow: 0 4px 0 #d98a0b;
  }
  .reg button:active { transform: translateY(3px); box-shadow: 0 1px 0 #d98a0b; }
  .ov-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .ov-saved { font-size: 13px; color: #d6f5e0; font-weight: 800; }
  .langtgl {
    margin-top: 4px; border: 2px solid rgba(255,255,255,.8); cursor: pointer;
    background: rgba(255,255,255,.25); color: #fff; font-weight: 800;
    font-size: 13px; padding: 7px 16px; border-radius: 999px;
  }
  .langtgl:active { transform: scale(.95); }
</style>
</head>
<body>
<div id="app">
  <div class="roof"></div>
  <div class="lights"><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>

  <div class="topbar">
    <div class="next-badge">
      <div class="next-circle" id="nextEmoji">🫐</div>
      <span id="nextLbl">Next</span>
    </div>
    <div class="score-pill" id="scorePill">
      <span id="score">0</span>
      <small><span id="bestLbl">BEST</span> <span id="best">0</span></small>
    </div>
    <button id="muteBtn" aria-label="音のオンオフ">🔊</button>
  </div>

  <div class="stage-wrap" id="stageWrap">
    <canvas id="stage"></canvas>
    <div class="bolts"></div>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">ゲームオーバー</h2>
      <p id="ovText">手前に溜まりすぎ！</p>
      <div class="reg" id="regBox">
        <input id="nameInput" maxlength="10" placeholder="なまえ" />
        <button id="regBtn">登録</button>
      </div>
      <div class="ov-saved" id="ovSaved" style="display:none;">ランキングに登録しました！</div>
      <div class="ov-row">
        <button class="btn" id="restart">もう一度</button>
        <button class="bigbtn alt" id="ovRank">🏆 ランキング</button>
      </div>
    </div>
  </div>

  <div class="evo-wrap"><div class="evo-bar" id="chain"></div></div>

  <!-- スタート画面 -->
  <div class="screen" id="startScreen">
    <img class="titleArt" src="icon-512.png" alt="" />
    <h1 class="big" id="startTitle">フルーツパフェ<br>カーリング</h1>
    <p class="sub" id="startSub">手前から奥へスライド！ 同じフルーツを合体させて、パフェを目指そう🍨</p>
    <div class="bestline"><span id="startBestLbl">ベスト</span> <span id="startBest">0</span></div>
    <button class="bigbtn" id="startBtn">▶ スタート</button>
    <button class="bigbtn alt" id="startRank">🏆 ランキング</button>
    <button class="langtgl" id="langToggle">🌐 English</button>
  </div>

  <!-- ランキング画面 -->
  <div class="screen" id="rankScreen">
    <h1 class="big" id="rankTitle">🏆 ランキング</h1>
    <ol class="ranklist" id="rankList"></ol>
    <button class="bigbtn" id="rankClose">とじる</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Render, Runner, World, Bodies, Body, Events, Composite } = Matter;

const ITEMS = [
  { emoji: "🫐", r: 15, name: "ブルーベリー" },
  { emoji: "🍓", r: 19, name: "いちご" },
  { emoji: "🍒", r: 24, name: "さくらんぼ" },
  { emoji: "🥝", r: 30, name: "キウイ" },
  { emoji: "🍑", r: 37, name: "もも" },
  { emoji: "🍊", r: 45, name: "みかん" },
  { emoji: "🍍", r: 54, name: "パイナップル" },
  { emoji: "🍈", r: 63, name: "メロン" },
  { emoji: "🍉", r: 73, name: "スイカ" },
  { emoji: "🍦", r: 83, name: "ソフトクリーム" },
  { emoji: "🍨", r: 94, name: "パフェ完成！" },
];
const SPAWNABLE = 4;

let W = 420, H = 620;
const WALL = 16;

const stageWrap = document.getElementById("stageWrap");
const canvas = document.getElementById("stage");
const scoreEl = document.getElementById("score");
const scorePill = document.getElementById("scorePill");
const bestEl = document.getElementById("best");
const nextEmojiEl = document.getElementById("nextEmoji");
const overlay = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const muteBtn = document.getElementById("muteBtn");

let engine, runner, render;
let score = 0;
let best = +(localStorage.getItem("ftp_best") || 0);
let nextLevel = 0;
let activeBody = null;
let phase = "aim";
let gameOver = false;
let overflowTimer = 0;
let maxRevealed = SPAWNABLE - 1;
let started = false;   // スタート画面を抜けたか
let lastScore = 0;     // 直近の確定スコア（登録用）

/* ===================== 多言語（日本語 / 英語） ===================== */
const I18N = {
  ja: {
    title: "フルーツパフェ<br>カーリング",
    sub: "手前から奥へスライド！ 同じフルーツを合体させて、パフェを目指そう🍨",
    next: "つぎ", best: "ベスト", start: "▶ スタート", ranking: "🏆 ランキング",
    close: "とじる", retry: "もう一度", register: "登録", name: "なまえ",
    saved: "ランキングに登録しました！", empty: "まだ記録がありません", guest: "ゲスト",
    gameover: "ゲームオーバー", overflow: "手前に溜まりすぎ！ スコア {s}",
    clear: "🍨 パフェ完成！", clearText: "おみごと！ スコア {s}",
    toggle: "🌐 English",
  },
  en: {
    title: "Fruit Parfait<br>Curling",
    sub: "Slide forward and merge matching fruits to build the ultimate parfait! 🍨",
    next: "Next", best: "Best", start: "▶ Start", ranking: "🏆 Ranking",
    close: "Close", retry: "Retry", register: "Save", name: "Name",
    saved: "Saved to the ranking!", empty: "No records yet", guest: "Guest",
    gameover: "Game Over", overflow: "Too crowded at the front! Score {s}",
    clear: "🍨 Parfait Complete!", clearText: "Brilliant! Score {s}",
    toggle: "🌐 日本語",
  },
};
let lang = localStorage.getItem("ftp_lang");
if (!lang) lang = (navigator.language || "en").toLowerCase().startsWith("ja") ? "ja" : "en";
function t(k, s) { const v = (I18N[lang] && I18N[lang][k]) || I18N.en[k] || k; return s != null ? v.replace("{s}", s) : v; }
function setText(id, k) { const el = document.getElementById(id); if (el) el.textContent = t(k); }
function applyI18n() {
  document.documentElement.lang = lang;
  setText("nextLbl", "next");
  setText("bestLbl", "best");
  setText("startBestLbl", "best");
  document.getElementById("startTitle").innerHTML = t("title");
  setText("startSub", "sub");
  setText("startBtn", "start");
  setText("startRank", "ranking");
  setText("rankTitle", "ranking");
  setText("rankClose", "close");
  setText("regBtn", "register");
  setText("ovRank", "ranking");
  setText("restart", "retry");
  setText("ovSaved", "saved");
  document.getElementById("nameInput").placeholder = t("name");
  document.getElementById("langToggle").textContent = t("toggle");
}

function anchorPos() { return { x: W / 2, y: H - 56 }; }
function foulY() { return H - 96; }

let aiming = false;
let aimVec = { x: 0, y: 0 };
const MAX_PULL = 200;
const POWER = 0.12;
const MIN_POWER_DIST = 14;

bestEl.textContent = best;

/* ===================== オーディオ ===================== */
let AC = null, master, musicGain, sfxGain;
let audioOn = true, musicStarted = false;
let nextStepTime = 0, musicStep = 0, musicTimer = null;
const BPM = 128, STEP_DUR = 60 / BPM / 2;
const LEAD = [659, 0, 784, 880, 784, 659, 587, 0, 523, 0, 659, 784, 880, 0, 784, 587];
const BASS = [131, 0,0,0, 175, 0,0,0, 110, 0,0,0, 98, 0,0,0];
function initAudio() {
  if (AC) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  AC = new Ctx();
  master = AC.createGain(); master.gain.value = 0.9; master.connect(AC.destination);
  musicGain = AC.createGain(); musicGain.gain.value = 0.0; musicGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(master);
}
function startMusicLoop() {
  if (!musicStarted) { musicStarted = true; nextStepTime = AC.currentTime + 0.1; musicTimer = setInterval(scheduler, 25); }
  applyAudioState();
}
function unlockAudio() {
  initAudio();
  if (AC.state !== "running") {
    AC.resume().then(startMusicLoop).catch(startMusicLoop);
  } else {
    startMusicLoop();
  }
}
function ensureRunning() { if (AC && AC.state !== "running") AC.resume().catch(() => {}); }
function applyAudioState() {
  if (!AC) return;
  const t = AC.currentTime;
  musicGain.gain.cancelScheduledValues(t);
  musicGain.gain.linearRampToValueAtTime(audioOn ? 0.16 : 0.0, t + 0.2);
  sfxGain.gain.setValueAtTime(audioOn ? 0.9 : 0.0, t);
}
function scheduler() {
  if (!AC) return;
  while (nextStepTime < AC.currentTime + 0.12) {
    const s = musicStep % 16;
    if (LEAD[s]) blip(LEAD[s], nextStepTime, 0.16, "triangle", 0.5, musicGain);
    if (BASS[s]) blip(BASS[s], nextStepTime, 0.22, "sine", 0.7, musicGain);
    if (s % 2 === 1) hat(nextStepTime, musicGain, 0.12);
    nextStepTime += STEP_DUR; musicStep++;
  }
}
function blip(freq, t, dur, type, gain, dest) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(dest);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
function hat(t, dest, gain) {
  const buf = AC.createBuffer(1, 256, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
  const g = AC.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  src.connect(hp); hp.connect(g); g.connect(dest); src.start(t); src.stop(t + 0.06);
}
function sfxMerge(level) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime; const base = 420 * Math.pow(1.07, level * 2);
  blip(base, t, 0.18, "triangle", 0.5, sfxGain);
  blip(base * 1.5, t + 0.05, 0.16, "sine", 0.35, sfxGain);
  blip(base * 2, t + 0.1, 0.12, "sine", 0.22, sfxGain);
}
function sfxLaunch(power) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime; const o = AC.createOscillator(), g = AC.createGain();
  o.type = "sawtooth"; o.frequency.setValueAtTime(260 + power * 320, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.26);
  g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.22, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.3);
}
function sfxEnd(winFlag) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const seq = winFlag ? [523, 659, 784, 1046, 1318] : [523, 440, 349, 262];
  seq.forEach((f, i) => blip(f, t + i * 0.13, 0.3, winFlag ? "triangle" : "sawtooth", 0.5, sfxGain));
}
muteBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  audioOn = !audioOn; muteBtn.textContent = audioOn ? "🔊" : "🔇";
  if (!AC) unlockAudio(); else applyAudioState();
});

/* ===================== テクスチャ（生成イラスト） ===================== */
const TEX = 256; // assets/itemN.png は 256x256
function itemImg(level) { return "assets/item" + level + ".png"; }
function makeItem(level, x, y, opts = {}) {
  const it = ITEMS[level];
  const sc = (it.r * 2) / TEX;
  const body = Bodies.circle(x, y, it.r, {
    restitution: 0.08, friction: 0.05, frictionAir: 0.03, density: 0.0014,
    label: "item",
    render: { sprite: { texture: itemImg(level), xScale: sc, yScale: sc } },
    ...opts,
  });
  body.level = level; body.merging = false;
  return body;
}

function setupWorld() {
  engine = Engine.create();
  engine.gravity.y = 0; engine.gravity.x = 0;
  render = Render.create({
    canvas, engine,
    options: { width: W, height: H, wireframes: false, background: "transparent",
      pixelRatio: window.devicePixelRatio || 1 },
  });
  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  const wallOpts = { isStatic: true, restitution: 0, friction: 0.1, render: { visible: false } };
  World.add(engine.world, [
    Bodies.rectangle(W / 2, -WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(W / 2, H + WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(-WALL / 2, H / 2, WALL, H * 2, wallOpts),
    Bodies.rectangle(W + WALL / 2, H / 2, WALL, H * 2, wallOpts),
  ]);
  Events.on(engine, "collisionStart", handleCollision);
  Events.on(engine, "afterUpdate", afterUpdate);
}

function handleCollision(ev) {
  for (const pair of ev.pairs) {
    const a = pair.bodyA, b = pair.bodyB;
    if (a.label !== "item" || b.label !== "item") continue;
    if (a.merging || b.merging) continue;
    if (a.level !== b.level) continue;
    if (a.level >= ITEMS.length - 1) continue;

    a.merging = b.merging = true;
    const nx = (a.position.x + b.position.x) / 2;
    const ny = (a.position.y + b.position.y) / 2;
    const vx = (a.velocity.x + b.velocity.x) / 2;
    const vy = (a.velocity.y + b.velocity.y) / 2;
    const newLevel = a.level + 1;

    World.remove(engine.world, a);
    World.remove(engine.world, b);
    const merged = makeItem(newLevel, nx, ny);
    Body.setVelocity(merged, { x: vx, y: vy });
    World.add(engine.world, merged);

    popEffect(nx, ny, ITEMS[newLevel]);
    burst(nx, ny, newLevel);
    sfxMerge(newLevel);
    addScore((newLevel + 1) * 10);
    if (newLevel > maxRevealed) { maxRevealed = newLevel; updateEvoBar(); }
    if (newLevel === ITEMS.length - 1) win();
  }
}

const effects = [];
function popEffect(x, y, item) { effects.push({ x, y, r: item.r, life: 1 }); }
const confetti = [];
const CONF_COLORS = ["#ff5d8f", "#ff8a5b", "#ffd23f", "#5fd068", "#4dabf7", "#9775fa", "#ff85c0"];
function burst(x, y, level) {
  const n = 10 + level * 2;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    confetti.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, size: 3 + Math.random() * 5, rot: Math.random() * 6.28,
      vr: (Math.random() - 0.5) * 0.4, color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0] });
  }
}

let settleFrames = 0;
function afterUpdate() {
  if (gameOver) return;
  let maxSpeed = 0, overflow = false;
  for (const body of Composite.allBodies(engine.world)) {
    if (body.label !== "item") continue;
    if (body === activeBody && body.isStatic) continue;
    const sp = Math.hypot(body.velocity.x, body.velocity.y);
    if (sp > maxSpeed) maxSpeed = sp;
    if (sp < 0.5 && body.position.y - ITEMS[body.level].r > foulY()) overflow = true;
  }
  if (phase === "moving") {
    if (maxSpeed < 0.4) { settleFrames++; if (settleFrames > 18) { settleFrames = 0; spawnNext(); } }
    else settleFrames = 0;
  }
  if (overflow) { overflowTimer += 16; if (overflowTimer > 1400) endGame(); }
  else overflowTimer = 0;
}

function drawOverlayGfx() {
  const ctx = render.context;
  ctx.save();
  // ファウルライン（白い破線）
  ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 3; ctx.setLineDash([14, 12]); ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(14, foulY()); ctx.lineTo(W - 14, foulY()); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i]; e.life -= 0.05;
    if (e.life <= 0) { effects.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 + (1 - e.life) * 0.7), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${e.life})`; ctx.lineWidth = 3; ctx.stroke();
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const p = confetti[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.rot += p.vr; p.life -= 0.022;
    if (p.life <= 0) { confetti.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6); ctx.restore();
  }

  // エイミングガイド
  if (aiming && activeBody && phase === "aim") {
    const a = anchorPos();
    const dist = Math.hypot(aimVec.x, aimVec.y);
    const power = Math.min(dist, MAX_PULL) / MAX_PULL;
    const dir = dist > 0 ? { x: aimVec.x / dist, y: aimVec.y / dist } : { x: 0, y: -1 };
    const len = 60 + power * 300;
    ctx.strokeStyle = "rgba(255,255,255,0.95)"; ctx.lineWidth = 4; ctx.setLineDash([10, 9]);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x + dir.x * len, a.y + dir.y * len); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(a.x, a.y, ITEMS[activeBody.level].r + 8, -Math.PI / 2, -Math.PI / 2 + power * Math.PI * 2);
    ctx.strokeStyle = power > 0.85 ? "#ff5d8f" : "#ffd23f"; ctx.lineWidth = 5; ctx.stroke();
  } else if (activeBody && phase === "aim") {
    // 待機中：奥へのガイド線（参考画像の縦ライン）
    const a = anchorPos();
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 3; ctx.setLineDash([8, 11]); ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(a.x, a.y - ITEMS[activeBody.level].r - 4); ctx.lineTo(a.x, H * 0.1); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function spawnNext() {
  if (gameOver) return;
  phase = "aim";
  const level = nextLevel;
  nextLevel = Math.floor(Math.random() * SPAWNABLE);
  nextEmojiEl.innerHTML = '<img src="' + itemImg(nextLevel) + '" alt="">';
  const a = anchorPos();
  activeBody = makeItem(level, a.x, a.y, { isStatic: true });
  World.add(engine.world, activeBody);
}

function launch() {
  if (!activeBody || phase !== "aim") return;
  const dist = Math.hypot(aimVec.x, aimVec.y);
  if (dist < MIN_POWER_DIST) return;
  const power = Math.min(dist, MAX_PULL);
  const dirx = aimVec.x / dist, diry = aimVec.y / dist;
  const speed = power * POWER;
  const body = activeBody;
  Body.setStatic(body, false);
  Body.setVelocity(body, { x: dirx * speed, y: diry * speed });
  ensureRunning();
  sfxLaunch(power / MAX_PULL);
  activeBody = null; phase = "moving"; settleFrames = 0;
}

function toCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
}
function onDown(clientX, clientY) {
  unlockAudio();
  if (!started || gameOver || phase !== "aim" || !activeBody) return;
  aiming = true; updateAim(clientX, clientY);
}
function onMove(clientX, clientY) { if (aiming) updateAim(clientX, clientY); }
function onUp() { if (!aiming) return; aiming = false; launch(); aimVec = { x: 0, y: 0 }; }
function updateAim(clientX, clientY) {
  const p = toCanvas(clientX, clientY);
  const a = anchorPos();
  let vx = a.x - p.x;
  let vy = a.y - p.y;
  vy = -Math.abs(vy);
  if (vy > -10) vy = -10;
  aimVec = { x: vx, y: vy };
}

function addScore(n) {
  score += n; scoreEl.textContent = score;
  scorePill.classList.add("pop"); setTimeout(() => scorePill.classList.remove("pop"), 130);
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem("ftp_best", best); }
}

function showGameOver(title, text) {
  gameOver = true;
  lastScore = score;
  ovTitle.textContent = title;
  ovText.textContent = text;
  // 登録欄をリセット
  regBox.style.display = "flex";
  ovSaved.style.display = "none";
  nameInput.value = localStorage.getItem("ftp_name") || "";
  overlay.classList.add("show");
}
function endGame() {
  if (gameOver) return;
  showGameOver(t("gameover"), t("overflow", score));
  sfxEnd(false);
}
function win() {
  if (gameOver) return;
  showGameOver(t("clear"), t("clearText", score));
  sfxEnd(true);
}

function resetGame() {
  if (engine) { Render.stop(render); Runner.stop(runner); World.clear(engine.world); Engine.clear(engine); }
  effects.length = 0; confetti.length = 0;
  score = 0; scoreEl.textContent = 0;
  gameOver = false; phase = "aim"; activeBody = null;
  aiming = false; aimVec = { x: 0, y: 0 };
  overflowTimer = 0; settleFrames = 0;
  maxRevealed = SPAWNABLE - 1; updateEvoBar();
  nextLevel = Math.floor(Math.random() * SPAWNABLE);
  overlay.classList.remove("show");
  setupWorld();
  Events.on(render, "afterRender", drawOverlayGfx);
  spawnNext();
}
function measure() { const rect = stageWrap.getBoundingClientRect(); W = Math.round(rect.width); H = Math.round(rect.height); }

canvas.addEventListener("mousedown", (e) => onDown(e.clientX, e.clientY));
canvas.addEventListener("mousemove", (e) => onMove(e.clientX, e.clientY));
window.addEventListener("mouseup", onUp);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); const t = e.touches[0]; onDown(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); onUp(); }, { passive: false });
document.getElementById("restart").addEventListener("click", () => { unlockAudio(); resetGame(); });

/* 進化バー */
const chainEl = document.getElementById("chain");
const chainItems = ITEMS.map((it, i) => {
  const s = document.createElement("span");
  s.className = "item"; s.title = it.name;
  const im = document.createElement("img");
  im.src = itemImg(i); im.alt = "";
  s.appendChild(im);
  chainEl.appendChild(s); return s;
});
function updateEvoBar() {
  chainItems.forEach((el, i) => el.classList.toggle("locked", i > maxRevealed));
}

function preload(cb) {
  let done = 0, n = ITEMS.length;
  ITEMS.forEach((_, i) => {
    const im = new Image();
    im.onload = im.onerror = () => { if (++done === n) cb(); };
    im.src = itemImg(i);
  });
}

/* ===================== ランキング（ローカル保存） ===================== */
const RANK_KEY = "ftp_ranking";
const startScreen = document.getElementById("startScreen");
const rankScreen = document.getElementById("rankScreen");
const regBox = document.getElementById("regBox");
const ovSaved = document.getElementById("ovSaved");
const nameInput = document.getElementById("nameInput");
function escapeHtml(s) { return (s + "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
function getRanking() { try { return JSON.parse(localStorage.getItem(RANK_KEY)) || []; } catch (e) { return []; } }
function addRanking(name, sc) {
  const list = getRanking();
  const entry = { name: (name || t("guest")).slice(0, 10), score: sc, ts: Date.now() };
  list.push(entry);
  list.sort((a, b) => b.score - a.score);
  const top = list.slice(0, 10);
  localStorage.setItem(RANK_KEY, JSON.stringify(top));
  return entry;
}
function renderRanking(highlight) {
  const list = getRanking();
  const ol = document.getElementById("rankList");
  if (!list.length) { ol.innerHTML = '<li class="empty">' + t("empty") + '</li>'; return; }
  const medal = ["🥇", "🥈", "🥉"];
  ol.innerHTML = list.map((r, i) => {
    const me = highlight && r.ts === highlight.ts ? " me" : "";
    return `<li class="${me.trim()}"><span class="rk">${medal[i] || (i + 1)}</span>`
      + `<span class="nm">${escapeHtml(r.name)}</span><span class="sc">${r.score}</span></li>`;
  }).join("");
}
function showStart() {
  document.getElementById("startBest").textContent = best;
  rankScreen.classList.remove("show");
  overlay.classList.remove("show");
  startScreen.classList.add("show");
  started = false;
}
function beginGame() {
  unlockAudio();
  startScreen.classList.remove("show");
  rankScreen.classList.remove("show");
  resetGame();
  started = true;
}
function openRanking(highlight) { renderRanking(highlight); rankScreen.classList.add("show"); }

document.getElementById("startBtn").addEventListener("click", beginGame);
document.getElementById("startRank").addEventListener("click", () => openRanking());
document.getElementById("rankClose").addEventListener("click", () => {
  rankScreen.classList.remove("show");
  if (!started) startScreen.classList.add("show");
});
document.getElementById("ovRank").addEventListener("click", () => openRanking());
document.getElementById("langToggle").addEventListener("click", () => {
  lang = lang === "ja" ? "en" : "ja";
  localStorage.setItem("ftp_lang", lang);
  applyI18n();
});
document.getElementById("regBtn").addEventListener("click", () => {
  const nm = nameInput.value.trim() || t("guest");
  localStorage.setItem("ftp_name", nm);
  const entry = addRanking(nm, lastScore);
  regBox.style.display = "none";
  ovSaved.style.display = "block";
  openRanking(entry);
});

/* サービスワーカー登録（PWA／オフライン対応） */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
// どこを触っても音声をアンロック（キャンバス外のタップでも有効化）
["pointerdown", "touchstart", "mousedown", "keydown"].forEach((ev) =>
  window.addEventListener(ev, unlockAudio, { passive: true }));
// タブ復帰時に音声を再開（iOS等はバックグラウンドで停止する）
document.addEventListener("visibilitychange", () => { if (!document.hidden) ensureRunning(); });
window.addEventListener("focus", ensureRunning);
window.addEventListener("pageshow", ensureRunning);

window.addEventListener("resize", measure);
window.addEventListener("load", () => {
  measure(); applyI18n();
  preload(() => { resetGame(); showStart(); });
});
</script>
