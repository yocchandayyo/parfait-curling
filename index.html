<title>Fruit Parfait Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100vh; height: 100dvh;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; overscroll-behavior: none;
    /* ビーチ：空 → 海 → 砂浜 */
    background: linear-gradient(180deg,
      #79c6ef 0%, #a9def9 26%, #6fc6ec 31%,
      #2f9fd6 35%, #1f7fb8 44%, #7fcbe8 47.5%,
      #f4dda6 51%, #eccf8f 100%);
  }

  #app {
    width: 100%; max-width: 460px; height: 100%; max-height: 940px;
    display: flex; flex-direction: column;
    padding: max(4px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right))
             max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
    position: relative;
  }

  /* 藁屋根＋電飾 */
  /* ビーチ小屋の軒先（丸いスカラップ） */
  .roof {
    height: 22px; position: relative; z-index: 3; border-radius: 8px 8px 0 0;
    background:
      repeating-linear-gradient(90deg, rgba(120,78,28,0) 0 8px, rgba(120,78,28,.10) 8px 10px),
      linear-gradient(180deg, #f2cd91 0%, #ddab59 100%);
    box-shadow: 0 2px 5px rgba(0,0,0,.13);
  }
  .roof::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -7px; height: 9px; z-index: 3;
    background: radial-gradient(circle at 9px -2px, #ddab59 8px, transparent 8.5px);
    background-size: 18px 9px; background-repeat: repeat-x;
  }
  /* 電球ガーランド（ワイヤー＋雫型バルブ） */
  .lights {
    position: relative; height: 18px; margin-top: 8px; padding: 0 20px;
    display: flex; justify-content: space-evenly; align-items: flex-start; z-index: 3;
  }
  .lights::before {
    content: ""; position: absolute; top: 1px; left: 16px; right: 16px; height: 2px;
    background: rgba(80,55,25,.42); border-radius: 2px;
  }
  .lights b {
    position: relative; width: 9px; height: 12px; margin-top: 2px;
    border-radius: 50% 50% 50% 50% / 38% 38% 62% 62%;
  }
  .lights b::before {
    content: ""; position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
    width: 3px; height: 3px; background: rgba(80,55,25,.5); border-radius: 1px;
  }
  .lights b:nth-child(odd)  { background: #ffe27a; box-shadow: 0 0 8px 2px #ffe27a88; }
  .lights b:nth-child(even) { background: #ff9f43; box-shadow: 0 0 8px 2px #ff9f4388; margin-top: 6px; }

  /* 上部HUD */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 8px; z-index: 2; }
  .next-badge { display: flex; flex-direction: column; align-items: center; gap: 1px; width: 64px; }
  .next-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #fffaf0, #ffe7b8);
    border: 3px solid #ffd166; box-shadow: 0 3px 8px rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden;
  }
  .next-circle img { width: 84%; height: 84%; object-fit: contain; }
  .next-badge span { font-size: 12px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.35); }
  .score-pill {
    background: linear-gradient(180deg, #fff3d6, #ffe3a8);
    border: 3px solid #e9b85c; border-radius: 16px;
    padding: 4px 22px; font-size: 26px; font-weight: 900; color: #8a5a1c;
    box-shadow: 0 3px 8px rgba(0,0,0,.2); line-height: 1.1; text-align: center;
    transition: transform .12s;
  }
  .score-pill.pop { transform: scale(1.18); }
  .score-pill small { display:block; font-size: 10px; color:#b07d35; font-weight:800; letter-spacing:.5px; }
  #muteBtn {
    width: 50px; height: 50px; border-radius: 14px; border: 3px solid #e9b85c;
    background: radial-gradient(circle at 50% 35%, #ffe9a8, #ffcf5e);
    font-size: 22px; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,.25); line-height: 1;
  }
  #muteBtn:active { transform: scale(.92); }

  /* 木のテーブル（プレイ面） */
  .stage-wrap {
    position: relative; flex: 1; margin: 2px 2px 8px; z-index: 1;
    border-radius: 16px 16px 22px 22px; overflow: hidden;
    box-shadow: inset 0 0 0 6px #bd8244, inset 0 0 0 9px #97632e, 0 10px 22px rgba(60,35,10,.30);
    background:
      linear-gradient(180deg, rgba(60,34,10,.12) 0%, rgba(60,34,10,0) 14%),
      repeating-linear-gradient(90deg, rgba(86,52,20,0) 0 56px, rgba(86,52,20,.22) 56px 59px),
      repeating-linear-gradient(90deg, rgba(255,232,195,0) 0 56px, rgba(255,232,195,.12) 59px 62px),
      linear-gradient(180deg, #cf9054 0%, #dca05f 55%, #e6ad6c 100%);
  }
  .bolts {
    position: absolute; left: 0; right: 0; bottom: 26%; height: 7px; opacity: .45; pointer-events: none;
    background-image: radial-gradient(circle, #5a3812 2px, transparent 3px);
    background-size: 60px 7px; background-position: 12px 0;
  }
  canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 1; }

  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 14px; color: #fff; text-align: center; z-index: 5; padding: 20px;
    background: linear-gradient(160deg, rgba(31,127,184,.92), rgba(20,90,140,.92));
    backdrop-filter: blur(3px);
  }
  .overlay.show { display: flex; animation: fadein .3s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .overlay h2 { font-size: 32px; font-weight: 900; text-shadow: 0 3px 0 rgba(0,0,0,.18); }
  .overlay p { font-size: 16px; opacity: .95; font-weight: 600; margin-bottom: 2px; }
  /* ゲームオーバーのボタン：縦に整列・横幅統一・優先度を明確に */
  .ov-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; margin-top: 6px; }
  .ovbtn {
    width: min(250px, 80%); border: none; cursor: pointer;
    font-weight: 900; font-size: 18px; padding: 14px 18px; border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .08s, box-shadow .08s;
  }
  .ovbtn:active { transform: translateY(3px); }
  .ovbtn.revive {            /* 主役：復活（リワード動画） */
    display: none;           /* 復活可能時のみJSが表示 */
    background: linear-gradient(180deg, #7be0a3, #22b169); color: #06351f;
    font-size: 19px; padding: 16px 18px; box-shadow: 0 6px 0 #199457, 0 9px 16px rgba(0,0,0,.28);
  }
  .ovbtn.revive:active { box-shadow: 0 2px 0 #199457; }
  .ovbtn.retry {             /* 次点：もう一度 */
    background: linear-gradient(180deg, #ffd45e, #ff9e2c); color: #7a3d00;
    box-shadow: 0 5px 0 #e07d10, 0 8px 14px rgba(0,0,0,.24);
  }
  .ovbtn.retry:active { box-shadow: 0 1px 0 #e07d10; }
  .ovbtn.rank {              /* 補助：ランキング／タイトル（ゴースト） */
    background: rgba(255,255,255,.14); color: #fff; border: 2px solid rgba(255,255,255,.5);
    font-size: 16px; padding: 12px 18px;
  }
  .ovbtn.rank:active { background: rgba(255,255,255,.26); }
  /* 補助ボタン2つを横並び（ランキング／タイトル） */
  .ov-sub { display: flex; gap: 10px; width: min(250px, 80%); }
  .ov-sub .ovbtn { width: auto; flex: 1 1 0; min-width: 0; font-size: 14px; padding: 11px 6px; white-space: nowrap; }

  /* 進化バー（青い帯＋矢印） */
  .evo-wrap { position: relative; z-index: 2; padding: 0 2px; }
  .evo-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 2px; padding: 7px 26px 7px 12px;
    background: linear-gradient(180deg, #4cc6f2 0%, #1ba3da 100%);
    border: 3px solid #fff; border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,.25);
  }
  .evo-bar::after {
    content: ""; position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    border-top: 16px solid transparent; border-bottom: 16px solid transparent;
    border-left: 20px solid #1ba3da; filter: drop-shadow(2px 0 0 #fff);
  }
  .evo-bar .item { line-height: 0; transition: filter .2s, opacity .2s; }
  .evo-bar .item img { width: 23px; height: 23px; object-fit: contain; display: block; }
  .evo-bar .item.locked { filter: brightness(0) saturate(0); opacity: .4; }

  /* タイトル／ランキング画面：キービジュアル背景 */
  .screen {
    position: absolute; inset: 0; z-index: 30; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 15px; padding: 24px; text-align: center; overflow: hidden;
    background: #f3d8af center / cover no-repeat;
    background-image: url("title-bg.jpg");
  }
  .screen.show { display: flex; animation: fadein .3s ease; }

  #startScreen { justify-content: space-between; gap: 0; padding: 0 22px; }
  #startScreen::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 30%;
    background: linear-gradient(180deg, rgba(255,224,180,.5), rgba(255,224,180,0)); pointer-events: none;
  }
  #startScreen::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 46%;
    background: linear-gradient(0deg, rgba(70,35,25,.62), rgba(70,35,25,0)); pointer-events: none;
  }
  .startTop { padding-top: 13%; position: relative; z-index: 2; }
  .startBottom {
    width: 100%; padding-bottom: 9%; position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .logo {
    font-size: 35px; font-weight: 900; line-height: 1.04; letter-spacing: 1px; color: #fff;
    text-shadow:
      2.5px 0 #c2185b, -2.5px 0 #c2185b, 0 2.5px #c2185b, 0 -2.5px #c2185b,
      2px 2px #c2185b, -2px -2px #c2185b, 2px -2px #c2185b, -2px 2px #c2185b,
      0 7px 14px rgba(70,20,40,.55);
    animation: bob 3s ease-in-out infinite;
  }
  .screen .bestline {
    position: relative; z-index: 2; font-size: 14px; color: #b8005d; font-weight: 800;
    background: rgba(255,255,255,.92); padding: 5px 18px; border-radius: 999px; box-shadow: 0 3px 8px rgba(0,0,0,.25);
  }
  .bigbtn {
    position: relative; z-index: 2; border: none; cursor: pointer; width: 244px; max-width: 82%;
    background: linear-gradient(180deg, #ffd96a, #ff9d27); color: #7a3d00; font-weight: 900;
    font-size: 21px; padding: 16px 24px; border-radius: 18px; letter-spacing: .5px;
    box-shadow: 0 6px 0 #e07d10, 0 10px 20px rgba(0,0,0,.26); transition: transform .08s, box-shadow .08s;
  }
  .bigbtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e07d10, 0 4px 10px rgba(0,0,0,.26); }
  .bigbtn.alt {
    background: linear-gradient(180deg, #a8ddff, #49b1f0); color: #08456e;
    font-size: 17px; width: 244px; max-width: 82%; padding: 13px 24px; border-radius: 16px;
    box-shadow: 0 6px 0 #1d7fc0, 0 10px 18px rgba(0,0,0,.22);
  }
  .bigbtn.alt:active { transform: translateY(4px); box-shadow: 0 2px 0 #1d7fc0, 0 4px 8px rgba(0,0,0,.22); }

  /* ランキング画面の白カード */
  .glass-card {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 13px;
    width: min(340px, 88%); padding: 22px 22px 24px;
    background: rgba(255,255,255,.95); border: 4px solid #fff; border-radius: 26px;
    box-shadow: 0 18px 44px rgba(30,70,100,.32);
  }
  #rankTitle { color: #c2185b; text-shadow: none; }

  /* 演出：コンボ・新記録・画面シェイク */
  #comboPop {
    position: absolute; top: 24%; left: 50%; transform: translate(-50%, 0) scale(0.4);
    z-index: 4; pointer-events: none; opacity: 0;
    font-size: 34px; font-weight: 900; color: #fff;
    text-shadow: 2px 0 #ff7a00, -2px 0 #ff7a00, 0 2px #ff7a00, 0 -2px #ff7a00, 0 5px 10px rgba(0,0,0,.35);
    white-space: nowrap;
  }
  #comboPop.show { animation: comboPop .7s ease-out; }
  @keyframes comboPop {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.4); }
    25% { opacity: 1; transform: translate(-50%, 0) scale(1.15); }
    70% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -16px) scale(1); }
  }
  #bestFlash {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.6);
    z-index: 4; pointer-events: none; opacity: 0;
    font-size: 26px; font-weight: 900; color: #fff;
    text-shadow: 2px 0 #e0157a, -2px 0 #e0157a, 0 2px #e0157a, 0 -2px #e0157a, 0 4px 10px rgba(0,0,0,.3);
  }
  #bestFlash.show { animation: bestFlash 1.1s ease-out; }
  @keyframes bestFlash {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6) rotate(-6deg); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(3deg); }
    75% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -80px) scale(1); }
  }
  @keyframes shakeSm { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2px,1px)} 50%{transform:translate(2px,-2px)} 75%{transform:translate(-1px,2px)} }
  @keyframes shakeLg { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-3px)} 60%{transform:translate(-4px,-2px)} 80%{transform:translate(3px,3px)} }
  .stage-wrap.shakeSm { animation: shakeSm .22s ease; }
  .stage-wrap.shakeLg { animation: shakeLg .34s ease; }

  /* ランキング表 */
  .ranklist { list-style: none; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
  .ranklist li {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.85); border-radius: 12px; padding: 8px 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .ranklist .rk { font-size: 17px; font-weight: 900; color: #c2185b; width: 34px; text-align: center; }
  .ranklist .nm { flex: 1; text-align: left; font-weight: 700; color: #5a3a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ranklist .sc { font-weight: 900; color: #8a5a1c; }
  .ranklist li.me { background: #fff3c4; outline: 2px solid #ffcf5e; }
  .ranklist .empty { justify-content: center; color: #7a5a3a; font-weight: 700; }

  /* ゲームオーバーの登録欄 */
  .reg { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .reg input {
    width: 150px; font-size: 16px; padding: 9px 12px; border-radius: 12px;
    border: 2px solid #fff; background: rgba(255,255,255,.95); color: #5a3a1a; font-weight: 700; text-align: center;
  }
  .reg button {
    border: none; cursor: pointer; background: linear-gradient(180deg,#ffe66d,#ffb627);
    color: #8a4d05; font-weight: 900; font-size: 15px; padding: 9px 16px; border-radius: 12px; box-shadow: 0 4px 0 #d98a0b;
  }
  .reg button:active { transform: translateY(3px); box-shadow: 0 1px 0 #d98a0b; }
  .ov-saved { font-size: 13px; color: #d6f5e0; font-weight: 800; }
  .langtgl {
    position: relative; z-index: 2;
    margin-top: 2px; border: 1.5px solid rgba(255,255,255,.55); cursor: pointer;
    background: rgba(255,255,255,.14); color: #fff; font-weight: 800;
    font-size: 12.5px; padding: 7px 18px; border-radius: 999px;
    text-shadow: 0 1px 2px rgba(0,0,0,.3); backdrop-filter: blur(2px);
  }
  .langtgl:active { transform: scale(.95); }
  .nameRow { position: relative; z-index: 2; display: flex; align-items: center; gap: 8px; }
  .nameRow span { color: #fff; font-weight: 800; font-size: 14px; text-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .nameRow input {
    width: 150px; font-size: 15px; padding: 9px 12px; border-radius: 12px;
    border: 2px solid #fff; background: rgba(255,255,255,.95); color: #5a3a1a; font-weight: 700; text-align: center;
  }
  .nameOkBtn {
    border: none; cursor: pointer; background: linear-gradient(180deg,#ffe66d,#ffb627);
    color: #8a4d05; font-weight: 900; font-size: 14px; padding: 9px 14px; border-radius: 12px; box-shadow: 0 3px 0 #d98a0b;
  }
  .nameOkBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d98a0b; }
  /* 保存済みのなまえ表示（2回目以降は入力欄の代わりにこれを出す） */
  .nameDisplay { position: relative; z-index: 2; display: none; align-items: center; gap: 8px; }
  .playerTag {
    color: #fff; font-weight: 800; font-size: 15px; text-shadow: 0 1px 3px rgba(0,0,0,.45);
    background: rgba(255,255,255,.22); padding: 7px 16px; border-radius: 999px; border: 2px solid rgba(255,255,255,.7);
  }
  .playerTag b { font-weight: 900; }
  .nameEditBtn {
    border: 2px solid rgba(255,255,255,.7); cursor: pointer; background: rgba(255,255,255,.22);
    font-size: 14px; padding: 6px 10px; border-radius: 999px; line-height: 1;
  }
  .nameEditBtn:active { transform: scale(.95); }

  /* 広告オーバーレイ（テスト広告＝実ネットワーク導入までのスタブ表示） */
  .ad-overlay {
    position: absolute; inset: 0; z-index: 60; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(15,20,30,.94); backdrop-filter: blur(4px); padding: 24px;
  }
  .ad-overlay.show { display: flex; animation: fadein .25s ease; }
  .ad-box {
    width: min(330px, 90%); background: linear-gradient(180deg,#1f2937,#111827);
    border: 2px solid rgba(255,255,255,.15); border-radius: 22px; padding: 22px 20px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px; color: #fff; text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
  }
  .ad-badge {
    align-self: flex-start; font-size: 11px; font-weight: 900; letter-spacing: 1px;
    color: #111; background: #ffd54a; padding: 3px 9px; border-radius: 6px;
  }
  .ad-art { font-size: 64px; line-height: 1; animation: bob 2.4s ease-in-out infinite; }
  .ad-msg { font-size: 15px; font-weight: 700; opacity: .92; }
  .ad-count {
    font-size: 13px; font-weight: 800; color: #ffd54a;
    border: 1px solid rgba(255,213,74,.5); border-radius: 999px; padding: 4px 14px; min-width: 52px;
  }
  .ad-skip {
    margin-top: 4px; border: none; cursor: pointer; font-weight: 800; font-size: 14px;
    padding: 10px 20px; border-radius: 999px; background: #374151; color: #e5e7eb;
  }
  .ad-skip:active { transform: scale(.96); }
  .ad-skip.reward { background: linear-gradient(180deg,#ffe66d,#ffb627); color: #7a3d00; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
</style>
</head>
<body>
<div id="app">
  <div class="roof"></div>
  <div class="lights"><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>

  <div class="topbar">
    <div class="next-badge">
      <div class="next-circle" id="nextEmoji">🫐</div>
      <span id="nextLbl">Next</span>
    </div>

/* ===================== 多言語（日本語 / 英語） ===================== */

let lang = localStorage.getItem("ftp_lang") || "en";

function anchorPos() { return { x: W / 2, y: H - 56 }; }
function foulY() { return H - 96; }

let aiming = false;
let aimVec = { x: 0, y: 0 };
const MAX_PULL = 200;
const POWER = 0.12;
const MIN_POWER_DIST = 14;

bestEl.textContent = best;

/* ===================== オーディオ ===================== */
let AC = null, master, musicGain, sfxGain;
let audioOn = true, musicStarted = false;
let nextStepTime = 0, musicStep = 0, musicTimer = null;
const BPM = 104, STEP_DUR = 60 / BPM / 2;
// ゆったり可愛いオルゴール調メロディ（Cメジャー／I-vi-IV-V）
const LEAD = [659, 0, 784, 0, 659, 587, 523, 0, 587, 0, 659, 0, 587, 0, 0, 0];
const BASS = [131, 0, 0, 0, 110, 0, 0, 0, 87, 0, 0, 0, 98, 0, 0, 0];            // 柔らかいベース
const ARP  = [1046, 0, 0, 1318, 0, 0, 880, 0, 0, 1046, 0, 0, 988, 0, 1175, 0];  // ぽろぽろ鳴るオルゴール
function initAudio() {
  if (AC) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  AC = new Ctx();
  master = AC.createGain(); master.gain.value = 0.9; master.connect(AC.destination);
  musicGain = AC.createGain(); musicGain.gain.value = 0.0; musicGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(master);
}
// BGMはMureka生成のmp3をループ再生（合体/発射などの効果音はWeb Audioのまま）
// 2曲：タイトル画面用(titleAudio) と プレイ中用(bgmAudio) を切り替える
const bgmAudio = document.getElementById("bgmAudio");
const titleAudio = document.getElementById("titleAudio");
const BGM_VOL = 0.4;
let currentMusic = "title";   // 起動直後はスタート画面＝タイトル曲
function curMusicEl() { return currentMusic === "title" ? titleAudio : bgmAudio; }
function otherMusicEl() { return currentMusic === "title" ? bgmAudio : titleAudio; }
// 画面に応じて曲を切り替える（同じ曲なら再開のみ）
function playMusic(which) {
  currentMusic = which;
  const oth = otherMusicEl();
  if (oth) oth.pause();
  const cur = curMusicEl();
  if (cur) { cur.volume = audioOn ? BGM_VOL : 0; cur.play().catch(() => {}); }  // 自動再生制限：操作時に再生
}
function startMusicLoop() {
  playMusic(currentMusic);   // 旧オルゴールの自動生成メロディは止め、現在の画面の曲を再生
  applyAudioState();
}
function unlockAudio() {
  initAudio();
  if (AC.state !== "running") {
    AC.resume().then(startMusicLoop).catch(startMusicLoop);
  } else {
    startMusicLoop();
  }
}
function ensureRunning() {
  if (AC && AC.state !== "running") AC.resume().catch(() => {});
  const cur = curMusicEl();
  if (cur && audioOn && cur.paused) cur.play().catch(() => {});  // タブ復帰時に現在の曲を再開
}
function applyAudioState() {
  const cur = curMusicEl(), oth = otherMusicEl();
  if (cur) cur.volume = audioOn ? BGM_VOL : 0;   // 🔊ミュートボタンに連動
  if (oth) oth.volume = 0;                        // 裏の曲は常に無音
  if (!AC) return;
  const t = AC.currentTime;
  musicGain.gain.cancelScheduledValues(t);
  musicGain.gain.linearRampToValueAtTime(0.0, t + 0.2);    // 旧synthメロディは無音化
  sfxGain.gain.setValueAtTime(audioOn ? 0.9 : 0.0, t);
}
function scheduler() {
  if (!AC) return;
  while (nextStepTime < AC.currentTime + 0.12) {
    const s = musicStep % 16;
    if (LEAD[s]) blip(LEAD[s], nextStepTime, 0.34, "triangle", 0.42, musicGain);
    if (BASS[s]) blip(BASS[s], nextStepTime, 0.5, "sine", 0.5, musicGain);
    if (ARP[s]) blip(ARP[s], nextStepTime, 0.2, "triangle", 0.1, musicGain);
    nextStepTime += STEP_DUR; musicStep++;
  }
}
function blip(freq, t, dur, type, gain, dest) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(dest);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
function hat(t, dest, gain) {
  const buf = AC.createBuffer(1, 256, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
  const g = AC.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  src.connect(hp); hp.connect(g); g.connect(dest); src.start(t); src.stop(t + 0.06);
}
function sfxMerge(level, combo) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const base = 420 * Math.pow(1.07, level * 2) * (1 + ((combo || 1) - 1) * 0.06);  // 連鎖で高音化
  blip(base, t, 0.18, "triangle", 0.5, sfxGain);
  blip(base * 1.5, t + 0.05, 0.16, "sine", 0.35, sfxGain);
  blip(base * 2, t + 0.1, 0.12, "sine", 0.22, sfxGain);
}
function sfxLaunch(power) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime; const o = AC.createOscillator(), g = AC.createGain();
  o.type = "sawtooth"; o.frequency.setValueAtTime(260 + power * 320, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.26);
  g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.22, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.3);
}
function sfxEnd(winFlag) {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  const seq = winFlag ? [523, 659, 784, 1046, 1318] : [523, 440, 349, 262];
  seq.forEach((f, i) => blip(f, t + i * 0.13, 0.3, winFlag ? "triangle" : "sawtooth", 0.5, sfxGain));
}
// UI効果音：軽いタップ音
function sfxClick() {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  blip(880, t, 0.07, "triangle", 0.32, sfxGain);
  blip(1320, t + 0.035, 0.06, "sine", 0.20, sfxGain);
}
// スタート時：明るい上昇アルペジオ
function sfxStart() {
  if (!AC || !audioOn) return;
  const t = AC.currentTime;
  [660, 880, 1175, 1568].forEach((f, i) => blip(f, t + i * 0.06, 0.15, "triangle", 0.4, sfxGain));
}
// すべてのボタンにクリック音を自動付与（capture段階＝stopPropagationされても鳴る。ミュートボタンは除外）
document.addEventListener("click", (e) => {
  const b = e.target.closest("button");
  if (!b || b.id === "muteBtn") return;
  if (!AC) return;   // 初回はpointerdownのunlockAudioでAC生成→以降鳴る
  if (b.id === "startBtn") sfxStart(); else sfxClick();
}, true);
muteBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  audioOn = !audioOn; muteBtn.textContent = audioOn ? "🔊" : "🔇";
  if (!AC) unlockAudio(); else applyAudioState();
});

/* ===================== テクスチャ（生成イラスト） ===================== */
const TEX = 256; // assets/itemN.png は 256x256
function itemImg(level) { return "assets/item" + level + ".png"; }
function makeItem(level, x, y, opts = {}) {
  const it = ITEMS[level];
  const sc = (it.r * 2) / TEX;
  const body = Bodies.circle(x, y, it.r, {
    restitution: 0.08, friction: 0.05, frictionAir: 0.03, density: 0.0014,
    label: "item",
    render: { sprite: { texture: itemImg(level), xScale: sc, yScale: sc } },
    ...opts,
  });
  body.level = level; body.merging = false;
  return body;
}

function setupWorld() {
  engine = Engine.create();
  engine.gravity.y = 0; engine.gravity.x = 0;
  render = Render.create({
    canvas, engine,
    options: { width: W, height: H, wireframes: false, background: "transparent",
      pixelRatio: window.devicePixelRatio || 1 },
  });
  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  const wallOpts = { isStatic: true, restitution: 0, friction: 0.1, render: { visible: false } };
  World.add(engine.world, [
    Bodies.rectangle(W / 2, -WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(W / 2, H + WALL / 2, W, WALL, wallOpts),
    Bodies.rectangle(-WALL / 2, H / 2, WALL, H * 2, wallOpts),
    Bodies.rectangle(W + WALL / 2, H / 2, WALL, H * 2, wallOpts),
  ]);
  Events.on(engine, "collisionStart", handleCollision);
  Events.on(engine, "afterUpdate", afterUpdate);
}

function handleCollision(ev) {
  for (const pair of ev.pairs) {
    const a = pair.bodyA, b = pair.bodyB;
    if (a.label !== "item" || b.label !== "item") continue;
    if (a.merging || b.merging) continue;
    if (a.level !== b.level) continue;
    if (a.level >= ITEMS.length - 1) continue;

    a.merging = b.merging = true;
    const nx = (a.position.x + b.position.x) / 2;
    const ny = (a.position.y + b.position.y) / 2;
    const vx = (a.velocity.x + b.velocity.x) / 2;
    const vy = (a.velocity.y + b.velocity.y) / 2;
    const newLevel = a.level + 1;

    World.remove(engine.world, a);
    World.remove(engine.world, b);
    const merged = makeItem(newLevel, nx, ny);
    Body.setVelocity(merged, { x: vx, y: vy });
    World.add(engine.world, merged);

    popEffect(nx, ny, ITEMS[newLevel]);
    burst(nx, ny, newLevel);
    comboCount++;
    const gain = (newLevel + 1) * 10 * comboCount;  // 連鎖でボーナス
    addScore(gain);
    spawnScorePop(nx, ny, "+" + gain);
    sfxMerge(newLevel, comboCount);
    shakeStage(newLevel);
    if (comboCount >= 2) showCombo(comboCount);
    if (newLevel > maxRevealed) { maxRevealed = newLevel; updateEvoBar(); }
    if (newLevel === ITEMS.length - 1) win();
  }
}

/* 演出ヘルパー */
function spawnScorePop(x, y, text) { scorePops.push({ x, y, text, life: 1 }); }
function showCombo(n) {
  comboPopEl.textContent = t("combo") + " ×" + n + "!";
  comboPopEl.classList.remove("show"); void comboPopEl.offsetWidth; comboPopEl.classList.add("show");
}
function showBestFlash() {
  bestFlashEl.textContent = t("newbest");
  bestFlashEl.classList.remove("show"); void bestFlashEl.offsetWidth; bestFlashEl.classList.add("show");
}
function shakeStage(level) {
  const cls = level >= 6 ? "shakeLg" : "shakeSm";
  stageWrap.classList.remove("shakeSm", "shakeLg"); void stageWrap.offsetWidth; stageWrap.classList.add(cls);
}

const effects = [];
function popEffect(x, y, item) { effects.push({ x, y, r: item.r, life: 1 }); }
const confetti = [];
const CONF_COLORS = ["#ff5d8f", "#ff8a5b", "#ffd23f", "#5fd068", "#4dabf7", "#9775fa", "#ff85c0"];
function burst(x, y, level) {
  const n = 10 + level * 2;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    confetti.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, size: 3 + Math.random() * 5, rot: Math.random() * 6.28,
      vr: (Math.random() - 0.5) * 0.4, color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0] });
  }
}

let settleFrames = 0;
function afterUpdate() {
  if (gameOver) return;
  let maxSpeed = 0, overflow = false;
  for (const body of Composite.allBodies(engine.world)) {
    if (body.label !== "item") continue;
    if (body === activeBody && body.isStatic) continue;
    const sp = Math.hypot(body.velocity.x, body.velocity.y);
    if (sp > maxSpeed) maxSpeed = sp;
    if (sp < 0.5 && body.position.y - ITEMS[body.level].r > foulY()) overflow = true;
  }
  if (phase === "moving") {
    if (maxSpeed < 0.4) { settleFrames++; if (settleFrames > 18) { settleFrames = 0; spawnNext(); } }
    else settleFrames = 0;
  }
  if (overflow) { overflowTimer += 16; if (overflowTimer > 1400) endGame(); }
  else overflowTimer = 0;
}

function drawOverlayGfx() {
  const ctx = render.context;
  ctx.save();
  // ピンチ警告（ファウル付近に溜まると赤く脈打つ）
  const danger = overflowTimer > 0 && !gameOver;
  const pulse = danger ? (0.5 + 0.5 * Math.sin(Date.now() / 120)) : 0;
  if (danger) {
    const g = ctx.createLinearGradient(0, foulY(), 0, H);
    g.addColorStop(0, `rgba(255,40,40,${0.22 * pulse})`);
    g.addColorStop(1, "rgba(255,40,40,0)");
    ctx.fillStyle = g; ctx.fillRect(0, foulY(), W, H - foulY());
  }
  // ファウルライン（通常は白、危険時は赤く脈打つ）
  const c = danger ? Math.round(60 - pulse * 60) : 255;
  ctx.strokeStyle = danger ? `rgba(255,${c},${c},${0.75 + pulse * 0.25})` : "rgba(255,255,255,0.9)";
  ctx.lineWidth = danger ? 4 : 3; ctx.setLineDash([14, 12]); ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(14, foulY()); ctx.lineTo(W - 14, foulY()); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // 「+N」スコアポップ
  for (let i = scorePops.length - 1; i >= 0; i--) {
    const p = scorePops[i]; p.life -= 0.02; p.y -= 0.8;
    if (p.life <= 0) { scorePops.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
    ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(255,140,0,0.95)"; ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = "#fff"; ctx.fillText(p.text, p.x, p.y); ctx.restore();
  }

  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i]; e.life -= 0.05;
    if (e.life <= 0) { effects.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 + (1 - e.life) * 0.7), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${e.life})`; ctx.lineWidth = 3; ctx.stroke();
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const p = confetti[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.rot += p.vr; p.life -= 0.022;
    if (p.life <= 0) { confetti.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6); ctx.restore();
  }

  // エイミングガイド
  if (aiming && activeBody && phase === "aim") {
    const a = anchorPos();
    const dist = Math.hypot(aimVec.x, aimVec.y);
    const power = Math.min(dist, MAX_PULL) / MAX_PULL;
    const dir = dist > 0 ? { x: aimVec.x / dist, y: aimVec.y / dist } : { x: 0, y: -1 };
    const len = 60 + power * 300;
    ctx.strokeStyle = "rgba(255,255,255,0.95)"; ctx.lineWidth = 4; ctx.setLineDash([10, 9]);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x + dir.x * len, a.y + dir.y * len); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(a.x, a.y, ITEMS[activeBody.level].r + 8, -Math.PI / 2, -Math.PI / 2 + power * Math.PI * 2);
    ctx.strokeStyle = power > 0.85 ? "#ff5d8f" : "#ffd23f"; ctx.lineWidth = 5; ctx.stroke();
  } else if (activeBody && phase === "aim") {
    // 待機中：奥へのガイド線（参考画像の縦ライン）
    const a = anchorPos();
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 3; ctx.setLineDash([8, 11]); ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(a.x, a.y - ITEMS[activeBody.level].r - 4); ctx.lineTo(a.x, H * 0.1); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function spawnNext() {
  if (gameOver) return;
  phase = "aim";
  const level = nextLevel;
  nextLevel = Math.floor(Math.random() * SPAWNABLE);
  nextEmojiEl.innerHTML = '<img src="' + itemImg(nextLevel) + '" alt="">';
  const a = anchorPos();
  activeBody = makeItem(level, a.x, a.y, { isStatic: true });
  World.add(engine.world, activeBody);
}

function launch() {
  if (!activeBody || phase !== "aim") return;
  const dist = Math.hypot(aimVec.x, aimVec.y);
  if (dist < MIN_POWER_DIST) return;
  const power = Math.min(dist, MAX_PULL);
  const dirx = aimVec.x / dist, diry = aimVec.y / dist;
  const speed = power * POWER;
  const body = activeBody;
  Body.setStatic(body, false);
  Body.setVelocity(body, { x: dirx * speed, y: diry * speed });
  ensureRunning();
  sfxLaunch(power / MAX_PULL);
  activeBody = null; phase = "moving"; settleFrames = 0; comboCount = 0;
}

function toCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
}
function onDown(clientX, clientY) {
  unlockAudio();
  if (!started || gameOver || phase !== "aim" || !activeBody) return;
  aiming = true; updateAim(clientX, clientY);
}
function onMove(clientX, clientY) { if (aiming) updateAim(clientX, clientY); }
function onUp() { if (!aiming) return; aiming = false; launch(); aimVec = { x: 0, y: 0 }; }
function updateAim(clientX, clientY) {
  const p = toCanvas(clientX, clientY);
  const a = anchorPos();
  let vx = a.x - p.x;
  let vy = a.y - p.y;
  vy = -Math.abs(vy);
  if (vy > -10) vy = -10;
  aimVec = { x: vx, y: vy };
}

function addScore(n) {
  score += n; scoreEl.textContent = score;
  scorePill.classList.add("pop"); setTimeout(() => scorePill.classList.remove("pop"), 130);
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem("ftp_best", best); }
  if (!bestFlashed && bestAtStart > 0 && score > bestAtStart) { bestFlashed = true; showBestFlash(); }
}

/* ===================== 広告（Google H5 Games Ads／TWAにもそのまま反映される） =====================
   ローダ(adsbygoogle.js, client=ca-pub-6679576726407478)は<head>に設置済み＝サイト所有権の確認用。
   ▼本番化の手順（AdSense審査が通ってH5 Games Adsが有効になったら）：
     1. publisherId に "ca-pub-6679576726407478" を設定（←headと同じID）
     2. testMode: true でGoogleのテスト広告を確認 → OKなら false で本番収益化
   publisherId が空の間は内蔵テスト広告(stub)で動くので、審査中もプレイ体験は維持される。 */
const AD_CONFIG = {
  publisherId: "",                // 審査通過後に "ca-pub-6679576726407478" を設定（空ならテスト広告stub）
  testMode: true,                 // 審査前の確認用。本番収益化時は false
  interstitialEveryGames: 2,      // 何ゲームごとにインタースティシャルを出すか
  interstitialMinIntervalSec: 45, // 連続表示を避ける最短間隔（秒）

};
// パブリッシャーID未設定なら内蔵テスト広告、設定済みなら Google H5 Games Ads
const AD_PROVIDER = AD_CONFIG.publisherId ? "h5" : "stub";
const reviveBtn = document.getElementById("reviveBtn");
const adOverlay = document.getElementById("adOverlay");

const adCount = document.getElementById("adCount");
const adSkip = document.getElementById("adSkip");
let reviveUsed = false;           // 1ゲームにつき復活は1回まで

const Ads = (() => {
  let gamesSince = 0, lastInterTs = 0, busy = false, adTimer = null;
  function init() {
    if (AD_PROVIDER !== "h5") return;   // stubは初期化不要
    // ローダ(adsbygoogle.js)は<head>に静的設置済み。ここでは Placement API を設定するだけ
    window.adsbygoogle = window.adsbygoogle || [];
    window.adBreak = window.adConfig = function (o) { window.adsbygoogle.push(o); };
    window.adConfig({
      preloadAdBreaks: "on", sound: audioOn ? "on" : "off",
      ...(AD_CONFIG.testMode ? { adBreakTest: "on" } : {}),
    });
  }
  function noteGameEnd() { gamesSince++; }

  // 内蔵テスト広告：実ネットワーク導入までの代替（カウントダウン→完了）
  function runStub(kind, sec, onComplete, onSkip) {
    if (busy) return;
    busy = true;
    const rewarded = kind === "rewarded";
    adBadge.textContent = t("adLabel") + (AD_PROVIDER === "stub" ? " (TEST)" : "");
    adArt.textContent = rewarded ? "🎬" : "🍨";
    adMsg.textContent = rewarded ? t("adRewardHint") : t("adInterHint");
    adSkip.classList.toggle("reward", false);
    adSkip.style.display = "none";
    let left = sec;
    adCount.textContent = left;
    adOverlay.classList.add("show");
    clearInterval(adTimer);
    adTimer = setInterval(() => {
      left--;
      adCount.textContent = left > 0 ? left : "✓";
      if (left <= 0) {
        clearInterval(adTimer);
        // 完了：閉じるボタンを出して報酬確定
        adSkip.textContent = t("adClose");
        adSkip.classList.toggle("reward", rewarded);
        adSkip.style.display = "block";
        adSkip.onclick = () => { closeAd(); onComplete && onComplete(); };
      }
    }, 1000);
    // リワードのみ：途中スキップ（報酬なし）を1秒後に許可
    if (rewarded) {
      setTimeout(() => {
        if (!busy) return;
        if (adSkip.style.display === "none") {
          adSkip.textContent = t("adSkipReward");
          adSkip.style.display = "block";
          adSkip.onclick = () => { closeAd(); onSkip && onSkip(); };
        }
      }, 1000);
    }
  }
  function closeAd() { clearInterval(adTimer); adOverlay.classList.remove("show"); adSkip.onclick = null; busy = false; }

  function pauseBgmForAd() { try { bgmAudio.pause(); titleAudio.pause(); } catch (e) {} }
  function showInterstitial(done) {
    if (AD_PROVIDER !== "h5") return runStub("interstitial", 3, done, done);
    let fin = false;
    const finish = () => { if (!fin) { fin = true; resumeMusic(); done(); } };  // 失敗時もゲームへ戻す
    try {
      window.adBreak({ type: "next", name: "game-over",
        beforeAd: pauseBgmForAd, afterAd: () => {}, adBreakDone: finish });
    } catch (e) { finish(); }
    setTimeout(finish, 8000);   // 広告が出ない/詰まっても進める保険
  }
  function showRewarded(onReward, onClose) {
    if (AD_PROVIDER !== "h5")
      return runStub("rewarded", 5, () => { onReward && onReward(); }, () => { onClose && onClose(); });
    let rewarded = false, fin = false;
    const finish = () => { if (!fin) { fin = true; resumeMusic(); (rewarded ? onReward : onClose)(); } };
    try {
      window.adBreak({ type: "reward", name: "revive",
        beforeReward: (showAdFn) => showAdFn(),   // 復活ボタン押下＝視聴同意なので即表示
        adViewed: () => { rewarded = true; },      // 最後まで見た＝復活付与
        adDismissed: () => { rewarded = false; },  // 途中で閉じた＝復活なし
        beforeAd: pauseBgmForAd, afterAd: () => {}, adBreakDone: finish });
    } catch (e) { finish(); }
    setTimeout(finish, 15000);
  }
  // 頻度制限つきでインタースティシャルを挟む（条件未達ならそのまま cb）
  function maybeInterstitial(cb) {
    const now = Date.now();
    const due = gamesSince >= AD_CONFIG.interstitialEveryGames
      && (now - lastInterTs) / 1000 >= AD_CONFIG.interstitialMinIntervalSec;
    if (due) { gamesSince = 0; lastInterTs = now; showInterstitial(cb); }
    else cb();
  }
  return { init, noteGameEnd, showInterstitial, showRewarded, maybeInterstitial };
})();

// リワード視聴後の「復活」：危険ゾーンのフルーツを片付けて続行
function doRevive() {
  reviveUsed = true;

    if (body.label !== "item") continue;
    if (body.position.y - ITEMS[body.level].r > foulY() - 30) {

/* なまえは「初回起動時に1回だけ」入力。以降は保存名で自動ランキング送信される。 */
function isNameConfigured() {
  if (localStorage.getItem("ftp_name_set") === "1") return true;
  // 旧バージョンで既になまえを入れていた人は再入力を求めない（自動移行）
  if ((localStorage.getItem("ftp_name") || "").trim()) { localStorage.setItem("ftp_name_set", "1"); return true; }
  return false;
}
function currentName() { return (localStorage.getItem("ftp_name") || "").trim() || t("guest"); }
function saveName(raw) {
  localStorage.setItem("ftp_name", (raw || "").trim().slice(0, 10));
  localStorage.setItem("ftp_name_set", "1");   // 確定フラグ＝以後は入力を求めない
}
function refreshNameUI() {
  const configured = isNameConfigured();
  nameRow.style.display = configured ? "none" : "flex";
  nameDisplay.style.display = configured ? "flex" : "none";
  if (configured) playerNameEl.textContent = currentName();
  else nameInput.value = localStorage.getItem("ftp_name") || "";
}
function enterNameEdit() {   // ✏️で再入力モードに戻す
  nameRow.style.display = "flex";

  nameInput.focus();
}
// 端末ごとの永続プレイヤーID（ランキングを1人1行に集約するためのキー）
function playerId() {
  let id = localStorage.getItem("ftp_pid");
  if (!id) {
    id = (self.crypto && crypto.randomUUID) ? crypto.randomUUID()
       : "p_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("ftp_pid", id);
  }
  return id;
}
// 同一プレイヤー（pid優先、無ければ名前）を最高スコアの1件に集約 → スコア降順
function dedupBest(list) {
  const byKey = new Map();
  for (const r of list) {
    const key = r.pid || ("name:" + (r.name || ""));
    const prev = byKey.get(key);
    if (!prev || r.score > prev.score) byKey.set(key, r);
  }
  return [...byKey.values()].sort((a, b) => b.score - a.score);
}

document.getElementById("startRank").addEventListener("click", () => openRanking());
document.getElementById("rankClose").addEventListener("click", () => {
  rankScreen.classList.remove("show");
  if (!started) startScreen.classList.add("show");
});
document.getElementById("ovRank").addEventListener("click", () => openRanking(lastSubmitTs));
document.getElementById("ovHome").addEventListener("click", () => showStart());   // ゲームオーバー→タイトルへ
document.getElementById("langToggle").addEventListener("click", () => {
  lang = lang === "ja" ? "en" : "ja";
  localStorage.setItem("ftp_lang", lang);
  applyI18n();
});
// 名前はスタート画面で1回入力すれば保存され、以降は自動でランキング送信される
nameInput.addEventListener("input", () => {
  localStorage.setItem("ftp_name", nameInput.value.trim().slice(0, 10));  // 下書き保存
});
// OKボタン／Enterでなまえを確定（以後は表示モードに切替・再入力を求めない）
function commitName() { saveName(nameInput.value); refreshNameUI(); }
document.getElementById("nameOk").addEventListener("click", commitName);
nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); commitName(); } });
// ✏️で後からなまえを変更できる
document.getElementById("nameEdit").addEventListener("click", enterNameEdit);

/* サービスワーカー登録（PWA／オフライン対応・自動更新） */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      reg.update();
      // 新バージョン検知時、インストール完了かつ既存制御あり＝更新 → 自動リロード
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            location.reload();
          }
        });
      });
    }).catch(() => {});
  });
}
// どこを触っても音声をアンロック（キャンバス外のタップでも有効化）
["pointerdown", "touchstart", "mousedown", "keydown"].forEach((ev) =>
  window.addEventListener(ev, unlockAudio, { passive: true }));
// タブ復帰時に音声を再開（iOS等はバックグラウンドで停止する）
document.addEventListener("visibilitychange", () => { if (!document.hidden) ensureRunning(); });
window.addEventListener("focus", ensureRunning);
window.addEventListener("pageshow", ensureRunning);

window.addEventListener("resize", measure);
window.addEventListener("load", () => {
  measure(); applyI18n();
  preload(() => { resetGame(); showStart(); });
});
</script>
</body>
</html>
